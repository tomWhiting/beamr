[package]
name = "beamr"
version = "0.3.1"
edition = "2024"
description = "A Rust runtime with the BEAM's execution model, targeting Gleam"
readme = "README.md"
license = "MIT"
repository = "https://github.com/tomWhiting/yggdrasil"
authors = [
    "Tom Whiting <tom@ablative.com.au>",
    "Josh Bearup <Joshuabearup1@gmail.com>",
]

[dependencies]
base64 = { version = "0.22.1", optional = true }
crossbeam-deque = "0.8.6"
crossbeam-queue = "0.3.12"
dashmap = "6.1.0"
flate2 = "1.1.9"
rand = "0.10.1"
serde_json = { version = "1.0.150", optional = true }

[dev-dependencies]
proptest = "1.11.0"

[features]
json = ["dep:base64", "dep:serde_json"]
test-support = []
