# CONVENTIONS.toml — post-mutation check configuration for Norn.
#
# Enforces beamr governance rules (GOVERNANCE.md §2 A3, §3):
#   - No source file over 500 lines (hard block)
#   - Entrypoints (mod.rs, lib.rs, main.rs) capped at 400 lines (hard block)
#   - Clippy -D warnings on all Rust files (blocks mutations that introduce warnings)
#
# "block" = norn refuses to finalise the mutation; "advise" = note only.

[rust-general]
tools = ["write", "edit", "apply_patch"]
paths = ["*.rs", "**/*.rs"]
loc = { limit = 500, handling = "block" }
advise_on = []
block_on = ["clippy"]

[rust-entrypoints]
tools = ["write", "edit", "apply_patch"]
paths = ["**/mod.rs", "**/lib.rs", "**/main.rs"]
loc = { limit = 400, handling = "block" }
advise_on = []
block_on = ["clippy"]
priority = 10
