name: Staleness Audit

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  audit:
    name: Check for stale work
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Audit staleness
        id: audit
        run: |
          findings=""

          # Check josh/dev ahead of main
          if git rev-parse origin/josh/dev >/dev/null 2>&1; then
            ahead=$(git rev-list --count origin/main..origin/josh/dev 2>/dev/null || echo 0)
            if [ "$ahead" -gt 3 ]; then
              findings="${findings}- josh/dev is **${ahead} commits** ahead of main without a PR\n"
            fi
          fi

          # Check for open PRs older than 24h with no review
          open_prs=$(gh pr list --state open --json number,title,createdAt,reviewDecision --jq '.[] | select(.reviewDecision == "" or .reviewDecision == null) | "- PR #\(.number): \(.title) (opened \(.createdAt))"')
          if [ -n "$open_prs" ]; then
            findings="${findings}### Unreviewed PRs\n${open_prs}\n"
          fi

          # Check for empty architecture docs
          for doc in docs/architecture/*.md; do
            if [ -f "$doc" ] && [ ! -s "$doc" ]; then
              findings="${findings}- Empty architecture doc: \`${doc}\`\n"
            fi
          done

          # Check component tracker for items not progressing (exclude rows with Done/Merged/PR)
          if [ -f docs/governance/COMPONENT-TRACKER.md ]; then
            stalled=$(grep '| -- | -- | B-' docs/governance/COMPONENT-TRACKER.md | grep -cv 'Done\|Merged\|PR #' || true)
            total=$(grep -c '| B-' docs/governance/COMPONENT-TRACKER.md || true)
            if [ "$stalled" -gt 0 ]; then
              findings="${findings}- **${stalled}/${total}** components have no research or implementation started\n"
            fi
          fi

          if [ -z "$findings" ]; then
            echo "No staleness found."
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
            # Write findings to file for the issue body
            printf "%b" "$findings" > /tmp/findings.txt
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update issue
        if: steps.audit.outputs.has_findings == 'true'
        run: |
          body="## Staleness Audit — $(date -u +%Y-%m-%d)

          $(cat /tmp/findings.txt)

          ---
          _Auto-generated by staleness-audit workflow. Run manually: Actions → Staleness Audit → Run workflow._"

          existing=$(gh issue list --label staleness-audit --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create \
              --title "Staleness audit: $(date -u +%Y-%m-%d)" \
              --body "$body" \
              --label staleness-audit
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
