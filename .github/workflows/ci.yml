name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check + Clippy + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check -p beamr-cli

      - name: cargo clippy
        run: cargo clippy -p beamr-cli -- -D warnings

      - name: cargo test
        run: cargo test -p beamr-cli

      # TODO: expand to --workspace once core crate (B-001..B-008) lands clean

  file-size:
    name: File size check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No file over 500 lines
        run: |
          violations=$(find crates/ -name '*.rs' -exec awk 'END { if (NR > 500) print FILENAME ": " NR " lines" }' {} \;)
          if [ -n "$violations" ]; then
            echo "Files exceeding 500-line limit:"
            echo "$violations"
            exit 1
          fi
