name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check + Clippy + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check -p beamr-cli

      - name: cargo clippy
        run: cargo clippy -p beamr-cli --no-deps -- -D warnings

      - name: cargo test
        run: cargo test -p beamr-cli

      # TODO: expand to --workspace once core crate (B-001..B-008) lands clean

  file-size:
    name: File size check (tokei)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tokei
        run: cargo install tokei --locked

      - name: No file over 500 code lines
        run: |
          violations=$(tokei crates/ --output json \
            | jq -r 'to_entries[] | .value.reports[] | select(.stats.code > 500) | "\(.name): \(.stats.code) code lines"')
          if [ -n "$violations" ]; then
            echo "Files exceeding 500 code-line limit (tokei counts code only, not comments/blanks):"
            echo "$violations"
            exit 1
          fi
