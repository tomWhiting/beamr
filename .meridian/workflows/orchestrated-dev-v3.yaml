name: orchestrated-dev-v3
description: |
  Design-driven development cycle. Brief JSON in, enriched implementation out.
  Each stage enriches the requirements array — at completion, every R# carries
  a full record of context, implementation, hardening, and review.

input:
  brief:
    type: text
    required: true
    description: "Brief JSON (schema: .meridian/design-system/schemas/brief.schema.json)."
  design_content:
    type: text
    required: false
    description: Design document content (pass via --input "design_content=$(cat path/to/DESIGN.md)").
  checklist_content:
    type: text
    required: false
    description: Checklist JSON content for C-number resolution (pass via --input "checklist_content=$(cat path/to/checklist.json)").
  stories_content:
    type: text
    required: false
    description: Stories JSON content for S-number resolution (pass via --input "stories_content=$(cat path/to/stories.json)").
  notify:
    type: text
    required: false
    description: Member name to notify on completion.
  run-name:
    type: text
    required: false
    description: 'Label for the notification DM (e.g. "brief M-002").'

steps:
  # ═══════════════════════════════════════════════════════════════════════════
  # SCOUT — read-only codebase exploration, enrich each R#
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Scout
    kind: action
    target: function
    profile: codebase-explorer
    output_schema: |
      {
        "type": "object",
        "properties": {
          "summary": {"type": "string", "description": "2-3 sentences orienting the implementer."},
          "enrichments": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "id": {"type": "string", "description": "R# id from the brief"},
                "related_files": {"type": "array", "items": {"type": "string"}, "description": "Existing files relevant to this R# (path + brief note on why)"},
                "context": {"type": "array", "items": {"type": "string"}, "description": "Key findings: sibling conventions, type signatures, module layout"},
                "references": {"type": "array", "items": {"type": "string"}, "description": "Files to reference during implementation (path:line-range)"}
              },
              "required": ["id", "related_files", "context", "references"]
            }
          }
        },
        "required": ["summary", "enrichments"]
      }
    prompt: |
      Gather codebase context for each requirement in the brief. You are read-only.

      For each R#, find:
      - **Related files**: existing files relevant to this requirement
      - **Context**: conventions, type signatures, module patterns the implementer should follow
      - **References**: specific file:line-range to look at during implementation

      <documents>
      {?input.design_content}
      <document index="1">
        <source>design_document</source>
        <document_content>
      {input.design_content}
        </document_content>
      </document>
      {/}
      <document index="2">
        <source>brief</source>
        <document_content>
      # {input.brief.id}: {input.brief.title}

      ## Purpose

      {input.brief.purpose}

      ## Task

      {input.brief.task}

      ## Requirements

      {#each input.brief.requirements as r}
      <requirement id="{r.id}">
      ### {r.id}: {r.title}

      {r.spec}

      Files to create: {r.files.create[*]}
      Files to modify: {r.files.modify[*]}
      {?r.files.delete}Files to delete: {r.files.delete[*]}{/}

      Acceptance:
      {#each r.acceptance as a}
      - {a}
      {/each}
      </requirement>
      {/each}
        </document_content>
      </document>
      </documents>
    merge:
      from: enrichments
      into: input.brief.requirements
      key: id
    routes:
      success: Plan
      failure: Done

  # ═══════════════════════════════════════════════════════════════════════════
  # PLAN — generate ordered tasks + verification items
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Plan
    kind: action
    target: function
    profile: planner
    output_schema: |
      {
        "type": "object",
        "properties": {
          "tasks": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "id": {"type": "string", "description": "Sequential: 1, 2, 3..."},
                "subject": {"type": "string", "description": "Short task title (imperative, under 80 chars)."},
                "description": {"type": "string", "description": "Specific enough to execute without questions."},
                "activeForm": {"type": "string", "description": "Present continuous for spinner."},
                "status": {"type": "string", "enum": ["pending"]},
                "blocks": {"type": "array", "items": {"type": "string"}},
                "blockedBy": {"type": "array", "items": {"type": "string"}}
              },
              "required": ["id", "subject", "description", "activeForm", "status", "blocks", "blockedBy"]
            }
          },
          "verification_items": {
            "type": "array",
            "items": {"type": "string"},
            "description": "Concrete checks the developer should run to verify their work."
          }
        },
        "required": ["tasks", "verification_items"]
      }
    prompt: |
      Plan the implementation as ordered tasks. Be specific — another agent executes these without asking questions.

      Also produce verification_items: concrete things the developer should check after implementing (e.g. "cargo check -p libmessage passes", "grep confirms no old imports remain").

      <documents>
      {?input.design_content}
      <document index="1">
        <source>design_document</source>
        <document_content>
      {input.design_content}
        </document_content>
      </document>
      {/}
      <document index="2">
        <source>brief</source>
        <document_content>
      # {input.brief.id}: {input.brief.title}

      ## Purpose

      {input.brief.purpose}

      ## Task

      {input.brief.task}

      ## Requirements (with codebase context from scout)

      {#each input.brief.requirements as r}
      <requirement id="{r.id}">
      ### {r.id}: {r.title}

      {r.spec}

      {?r.related_files}**Related files:** {r.related_files[*]}{/}
      {?r.context}**Context:** {r.context[*]}{/}
      {?r.references}**References:** {r.references[*]}{/}

      Files to create: {r.files.create[*]}
      Files to modify: {r.files.modify[*]}
      {?r.files.delete}Files to delete: {r.files.delete[*]}{/}

      Acceptance:
      {#each r.acceptance as a}
      - {a}
      {/each}
      </requirement>
      {/each}

      ## Boundaries

      {#each input.brief.boundaries as b}
      - {b}
      {/each}

      ## Verification

      {#each input.brief.verification as v}
      - {v}
      {/each}
        </document_content>
      </document>
      <document index="3">
        <source>scout_summary</source>
        <document_content>
      {Scout.summary}
        </document_content>
      </document>
      </documents>
    routes:
      success: Create Tasks
      failure: Done

  # ═══════════════════════════════════════════════════════════════════════════
  # CREATE TASKS — write task files for developer priming
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Create Tasks
    kind: execute
    command: |
      TASK_DIR="$HOME/.claude/tasks/{input.brief.id}"
      rm -rf "$TASK_DIR"
      mkdir -p "$TASK_DIR"
      TMPJSON=$(mktemp)
      cat > "$TMPJSON" <<'__YGG_TASKS_END__'
      {raw:Plan.tasks}
      __YGG_TASKS_END__
      TOTAL=$(jq length "$TMPJSON")
      for i in $(seq 0 $((TOTAL - 1))); do
        ID=$(jq -r ".[$i].id" "$TMPJSON")
        jq ".[$i]" "$TMPJSON" > "$TASK_DIR/$ID.json"
      done
      rm -f "$TMPJSON"
      echo "Created $TOTAL tasks"
    parser: lines
    routes:
      success: Dev
      failure: Done

  # ═══════════════════════════════════════════════════════════════════════════
  # DEV — implement the brief, enrich requirements with implementation detail
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Dev
    kind: action
    target: function
    profile: workflow-developer
    task_list_id: "{input.brief.id}"
    output_schema: |
      {
        "type": "object",
        "properties": {
          "summary": {"type": "string", "description": "1-2 sentences on what was done."},
          "commit_message": {"type": "string", "description": "Conventional-commits style."},
          "enrichments": {
            "type": "array",
            "description": "One entry per R# — how it was implemented.",
            "items": {
              "type": "object",
              "properties": {
                "id": {"type": "string", "description": "R# id"},
                "status": {"type": "string", "enum": ["implemented", "blocked"]},
                "files_changed": {
                  "type": "array",
                  "items": {
                    "type": "object",
                    "properties": {
                      "path": {"type": "string"},
                      "change": {"type": "string", "enum": ["created", "modified", "deleted"]},
                      "note": {"type": "string"}
                    },
                    "required": ["path", "change", "note"]
                  }
                },
                "how_satisfied": {"type": "string", "description": "How this requirement was met."},
                "deviation": {"type": "string", "description": "Empty if followed plan. Otherwise: what changed and why."},
                "checklist_status": {"type": "array", "items": {"type": "object", "properties": {"id": {"type": "string"}, "done": {"type": "boolean"}, "note": {"type": "string"}}, "required": ["id", "done", "note"]}, "description": "Status of each C# assigned to this R#."},
                "stories_status": {"type": "array", "items": {"type": "object", "properties": {"id": {"type": "string"}, "satisfied": {"type": "boolean"}, "note": {"type": "string"}}, "required": ["id", "satisfied", "note"]}, "description": "Status of each S# assigned to this R#."}
              },
              "required": ["id", "status", "files_changed", "how_satisfied", "deviation", "checklist_status", "stories_status"]
            }
          },
          "attestation": {
            "type": "object",
            "description": "Behavior bond — certify clean implementation.",
            "properties": {
              "no_panics": {"type": "boolean", "description": "No unwrap/expect/panic/todo in library code."},
              "no_unsafe": {"type": "boolean", "description": "No unsafe blocks added."},
              "boundaries_respected": {"type": "boolean", "description": "All SHALL NOT boundaries observed."},
              "tests_considered": {"type": "boolean", "description": "Tests added or existing tests still pass."}
            },
            "required": ["no_panics", "no_unsafe", "boundaries_respected", "tests_considered"]
          }
        },
        "required": ["summary", "commit_message", "enrichments", "attestation"]
      }
    prompt: |
      {?Run Checks (Dev).pass == false}
      CHECKS FAILED — fix only the specific failures below. Do not extend scope.

      {Run Checks (Dev).failure_report}
      {/}

      {?@resume == false}
      Implement the brief. Your task list has been populated — use TaskList to see tasks.

      <documents>
      {?input.design_content}
      <document index="1">
        <source>design_document</source>
        <document_content>
      {input.design_content}
        </document_content>
      </document>
      {/}
      <document index="2">
        <source>brief</source>
        <document_content>
      # {input.brief.id}: {input.brief.title}

      ## Purpose

      {input.brief.purpose}

      ## Task

      {input.brief.task}

      ## Requirements (enriched with codebase context)

      {#each input.brief.requirements as r}
      <requirement id="{r.id}">
      ### {r.id}: {r.title}

      {r.spec}

      {?r.related_files}**Related files:** {r.related_files[*]}{/}
      {?r.context}**Context:** {r.context[*]}{/}
      {?r.references}**References:** {r.references[*]}{/}

      Acceptance:
      {#each r.acceptance as a}
      - {a}
      {/each}

      {?r.checklist}Checklist items: {r.checklist[*]}{/}
      {?r.stories}User stories: {r.stories[*]}{/}
      </requirement>
      {/each}

      ## Boundaries

      {#each input.brief.boundaries as b}
      - {b}
      {/each}
        </document_content>
      </document>
      {?input.checklist_content}
      <document index="3">
        <source>checklist_reference</source>
        <document_content>
      {#each input.checklist_content.sections as s}
      **{s.name}:**
      {#each s.items as item}
      - {item.id}: {item.text}
      {/each}
      {/each}
        </document_content>
      </document>
      {/}
      {?input.stories_content}
      <document index="4">
        <source>stories_reference</source>
        <document_content>
      {#each input.stories_content.personas as p}
      **{p.name} — {p.role}:**
      {#each p.stories as story}
      - {story.id}: {story.text}
      {/each}
      {/each}
        </document_content>
      </document>
      {/}
      <document index="5">
        <source>verification_items</source>
        <document_content>
      {#each Plan.verification_items as v}
      - {v}
      {/each}
        </document_content>
      </document>
      <document index="6">
        <source>scout_summary</source>
        <document_content>
      {Scout.summary}
        </document_content>
      </document>
      </documents>

      ---

      For each R#, report: status, files changed (with notes), how satisfied, any deviation from plan. For each checklist item (C#) and user story (S#) assigned to the R#, report whether it was delivered.

      Before submitting, attest: no panics/unwraps in library code, no unsafe, boundaries respected, tests considered.
      {/}
    merge:
      from: enrichments
      into: input.brief.requirements
      key: id
    routes:
      success: Commit and Fix (Dev)
      failure: Done

  # ═══════════════════════════════════════════════════════════════════════════
  # COMMIT + FIX (Dev) — commit dev work + auto-fix, then check
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Commit and Fix (Dev)
    kind: execute
    command: |
      UNSTAGED=$(git diff --name-only)
      UNTRACKED=$(git ls-files --others --exclude-standard)
      ALL_CHANGED="$UNSTAGED $UNTRACKED"
      CRATES=$(echo "$ALL_CHANGED" | tr ' ' '\n' | grep '^crates/.*\.rs$' | cut -d/ -f1-2 | sort -u | while read dir; do
        if [ -f "$dir/Cargo.toml" ]; then
          grep '^name' "$dir/Cargo.toml" | head -1 | sed 's/name *= *"//;s/"//g'
        fi
      done | sort -u | tr '\n' ' ')
      if [ -z "$(echo "$ALL_CHANGED" | tr -d '[:space:]')" ]; then
        printf '{"committed":false,"crates_affected":"","changed_files":""}\n'
      else
        if [ -n "$CRATES" ]; then
          cargo clippy --all-targets --fix --allow-dirty --allow-staged $(printf -- '-p %s ' $CRATES) -- -D warnings 2>&1 || true
          cargo fmt --workspace 2>&1
        fi
        git add -A
        COMMIT_MSG_FILE=$(mktemp)
        cat > "$COMMIT_MSG_FILE" <<'__YGG_COMMIT_MSG__'
      {raw:Dev.commit_message}
      __YGG_COMMIT_MSG__
        git commit -F "$COMMIT_MSG_FILE" --no-verify 2>&1 || true
        rm -f "$COMMIT_MSG_FILE"
        CHANGED_FILES=$(git diff --name-only HEAD~1 2>/dev/null | tr '\n' ' ')
        printf '{"committed":true,"crates_affected":"%s","changed_files":"%s"}\n' "$CRATES" "$CHANGED_FILES"
      fi
    parser: json
    routes:
      success: Run Checks (Dev)
      failure: Run Checks (Dev)

  - name: Run Checks (Dev)
    kind: dispatch
    workflow: run-checks-and-tests
    inputs:
      scope: dev
      crates_affected: "{Commit and Fix (Dev).data.crates_affected}"
      changed_files: "{Commit and Fix (Dev).data.changed_files}"
    routes:
      success: Harden
      failure: Dev

  # ═══════════════════════════════════════════════════════════════════════════
  # HARDEN — verify implementation aligns with design intent
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Harden
    kind: action
    target: function
    profile: hardener
    output_schema: |
      {
        "type": "object",
        "properties": {
          "summary": {"type": "string"},
          "commit_message": {"type": "string"},
          "enrichments": {
            "type": "array",
            "description": "One entry per R# — hardening assessment.",
            "items": {
              "type": "object",
              "properties": {
                "id": {"type": "string"},
                "alignment": {"type": "string", "enum": ["aligned", "drifted", "fixed"]},
                "issues_found": {"type": "array", "items": {"type": "string"}},
                "fixes_applied": {"type": "array", "items": {"type": "string"}}
              },
              "required": ["id", "alignment", "issues_found", "fixes_applied"]
            }
          }
        },
        "required": ["summary", "commit_message", "enrichments"]
      }
    prompt: |
      {?Run Checks (Harden).pass == false}
      CHECKS FAILED — fix only the specific failures below.

      {Run Checks (Harden).failure_report}
      {/}

      {?@resume == false}
      Review and harden the implementation against the design intent.

      You are NOT re-implementing. Verify that what was built matches the philosophy, naming conventions, error handling patterns, and outcomes the design demands. Fix anything that drifts.

      <documents>
      {?input.design_content}
      <document index="1">
        <source>design_document</source>
        <document_content>
      {input.design_content}
        </document_content>
      </document>
      {/}
      <document index="2">
        <source>brief</source>
        <document_content>
      # {input.brief.id}: {input.brief.title}

      ## Purpose

      {input.brief.purpose}

      ## Task

      {input.brief.task}

      ## Requirements (with dev implementation notes)

      {#each input.brief.requirements as r}
      <requirement id="{r.id}">
      ### {r.id}: {r.title}

      {r.spec}

      {?r.how_satisfied}**Dev says:** {r.how_satisfied}{/}
      {?r.files_changed}**Files changed:**
      {#each r.files_changed as f}
      - {f.path} ({f.change}): {f.note}
      {/each}{/}
      {?r.deviation}**Deviation:** {r.deviation}{/}

      Acceptance:
      {#each r.acceptance as a}
      - {a}
      {/each}
      </requirement>
      {/each}

      ## Boundaries

      {#each input.brief.boundaries as b}
      - {b}
      {/each}
        </document_content>
      </document>
      <document index="3">
        <source>dev_attestation</source>
        <document_content>
      {?Dev.attestation}panics={Dev.attestation.no_panics}, unsafe={Dev.attestation.no_unsafe}, boundaries={Dev.attestation.boundaries_respected}, tests={Dev.attestation.tests_considered}{/}
        </document_content>
      </document>
      </documents>

      ---

      For each R#, assess: aligned/drifted/fixed. List issues found and fixes applied.
      {/}
    merge:
      from: enrichments
      into: input.brief.requirements
      key: id
    routes:
      success: Commit and Fix (Harden)
      failure: Done

  # ═══════════════════════════════════════════════════════════════════════════
  # COMMIT + FIX (Harden)
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Commit and Fix (Harden)
    kind: execute
    command: |
      UNSTAGED=$(git diff --name-only)
      UNTRACKED=$(git ls-files --others --exclude-standard)
      ALL_CHANGED="$UNSTAGED $UNTRACKED"
      CRATES=$(echo "$ALL_CHANGED" | tr ' ' '\n' | grep '^crates/.*\.rs$' | cut -d/ -f1-2 | sort -u | while read dir; do
        if [ -f "$dir/Cargo.toml" ]; then
          grep '^name' "$dir/Cargo.toml" | head -1 | sed 's/name *= *"//;s/"//g'
        fi
      done | sort -u | tr '\n' ' ')
      if [ -z "$(echo "$ALL_CHANGED" | tr -d '[:space:]')" ]; then
        printf '{"committed":false,"crates_affected":"","changed_files":""}\n'
      else
        if [ -n "$CRATES" ]; then
          cargo clippy --all-targets --fix --allow-dirty --allow-staged $(printf -- '-p %s ' $CRATES) -- -D warnings 2>&1 || true
          cargo fmt --workspace 2>&1
        fi
        git add -A
        COMMIT_MSG_FILE=$(mktemp)
        cat > "$COMMIT_MSG_FILE" <<'__YGG_COMMIT_MSG__'
      {raw:Harden.commit_message}
      __YGG_COMMIT_MSG__
        git commit -F "$COMMIT_MSG_FILE" --no-verify 2>&1 || true
        rm -f "$COMMIT_MSG_FILE"
        CHANGED_FILES=$(git diff --name-only HEAD~1 2>/dev/null | tr '\n' ' ')
        printf '{"committed":true,"crates_affected":"%s","changed_files":"%s"}\n' "$CRATES" "$CHANGED_FILES"
      fi
    parser: json
    routes:
      success: Run Checks (Harden)
      failure: Run Checks (Harden)

  - name: Run Checks (Harden)
    kind: dispatch
    workflow: run-checks-and-tests
    inputs:
      scope: harden
      crates_affected: "{Commit and Fix (Harden).data.crates_affected}"
      changed_files: "{Commit and Fix (Harden).data.changed_files}"
    routes:
      success: Review
      failure: Harden

  # ═══════════════════════════════════════════════════════════════════════════
  # REVIEW — criterion check against acceptance + verification + checklist
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Review
    kind: action
    target: function
    profile: reviewer
    output_schema: |
      {
        "type": "object",
        "properties": {
          "summary": {"type": "string"},
          "commit_message": {"type": "string"},
          "pass": {"type": "boolean", "description": "True if all criteria met."},
          "enrichments": {
            "type": "array",
            "description": "One entry per R# — review verdict.",
            "items": {
              "type": "object",
              "properties": {
                "id": {"type": "string"},
                "acceptance_met": {"type": "boolean"},
                "checklist_ticked": {"type": "array", "items": {"type": "string"}, "description": "Checklist IDs verified as done."},
                "stories_satisfied": {"type": "array", "items": {"type": "string"}, "description": "Story IDs verified as addressed."},
                "issues": {"type": "array", "items": {"type": "string"}, "description": "Problems found (empty if clean)."},
                "fixes_applied": {"type": "array", "items": {"type": "string"}, "description": "Fixes made during review."}
              },
              "required": ["id", "acceptance_met", "checklist_ticked", "stories_satisfied", "issues", "fixes_applied"]
            }
          },
          "verification_results": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "criterion": {"type": "string"},
                "passed": {"type": "boolean"},
                "note": {"type": "string"}
              },
              "required": ["criterion", "passed", "note"]
            }
          }
        },
        "required": ["summary", "commit_message", "pass", "enrichments", "verification_results"]
      }
    prompt: |
      {?Run Checks (Review).pass == false}
      CHECKS FAILED — fix only the specific failures below.

      {Run Checks (Review).failure_report}
      {/}

      {?@resume == false}
      Review the implementation against the brief's criteria. Check for stupid design decisions, unnecessary complexity, boundary violations.

      For each R#: verify acceptance criteria are met, tick off checklist items, confirm user stories addressed. Run what you can, grep what you can, check what's checkable.

      Then verify every top-level verification criterion.

      <documents>
      <document index="1">
        <source>brief_requirements</source>
        <document_content>
      # {input.brief.id}: {input.brief.title}

      ## Requirements (fully enriched — scout context + dev implementation + harden assessment)

      {#each input.brief.requirements as r}
      <requirement id="{r.id}">
      ### {r.id}: {r.title}

      {r.spec}

      {?r.how_satisfied}**Dev implementation:** {r.how_satisfied}{/}
      {?r.files_changed}**Files changed:**
      {#each r.files_changed as f}
      - {f.path} ({f.change}): {f.note}
      {/each}{/}
      {?r.alignment}**Harden verdict:** {r.alignment}{/}
      {?r.issues_found}**Harden issues:** {r.issues_found[*]}{/}
      {?r.fixes_applied}**Harden fixes:** {r.fixes_applied[*]}{/}

      Acceptance criteria:
      {#each r.acceptance as a}
      - [ ] {a}
      {/each}

      {?r.checklist}Checklist items: {r.checklist[*]}{/}
      {?r.stories}User stories: {r.stories[*]}{/}

      {?r.checklist_status}**Dev checklist status:**
      {#each r.checklist_status as c}
      - {c.id}: {c.note} (done: {c.done})
      {/each}{/}
      {?r.stories_status}**Dev stories status:**
      {#each r.stories_status as s}
      - {s.id}: {s.note} (satisfied: {s.satisfied})
      {/each}{/}
      </requirement>
      {/each}
        </document_content>
      </document>
      {?input.checklist_content}
      <document index="2">
        <source>checklist_reference</source>
        <document_content>
      {#each input.checklist_content.sections as s}
      **{s.name}:**
      {#each s.items as item}
      - {item.id}: {item.text}
      {/each}
      {/each}
        </document_content>
      </document>
      {/}
      {?input.stories_content}
      <document index="3">
        <source>stories_reference</source>
        <document_content>
      {#each input.stories_content.personas as p}
      **{p.name} — {p.role}:**
      {#each p.stories as story}
      - {story.id}: {story.text}
      {/each}
      {/each}
        </document_content>
      </document>
      {/}
      <document index="4">
        <source>boundaries</source>
        <document_content>
      {#each input.brief.boundaries as b}
      - {b}
      {/each}
        </document_content>
      </document>
      <document index="5">
        <source>dev_attestation</source>
        <document_content>
      {?Dev.attestation}panics={Dev.attestation.no_panics}, unsafe={Dev.attestation.no_unsafe}, boundaries={Dev.attestation.boundaries_respected}, tests={Dev.attestation.tests_considered}{/}
        </document_content>
      </document>
      <document index="6">
        <source>verification_criteria</source>
        <document_content>
      {#each input.brief.verification as v}
      - {v}
      {/each}

      {#each Plan.verification_items as v}
      - {v}
      {/each}
        </document_content>
      </document>
      </documents>
      {/}
    merge:
      from: enrichments
      into: input.brief.requirements
      key: id
    routes:
      success: Commit and Fix (Review)
      failure: Done

  # ═══════════════════════════════════════════════════════════════════════════
  # COMMIT + FIX (Review)
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Commit and Fix (Review)
    kind: execute
    command: |
      UNSTAGED=$(git diff --name-only)
      UNTRACKED=$(git ls-files --others --exclude-standard)
      ALL_CHANGED="$UNSTAGED $UNTRACKED"
      CRATES=$(echo "$ALL_CHANGED" | tr ' ' '\n' | grep '^crates/.*\.rs$' | cut -d/ -f1-2 | sort -u | while read dir; do
        if [ -f "$dir/Cargo.toml" ]; then
          grep '^name' "$dir/Cargo.toml" | head -1 | sed 's/name *= *"//;s/"//g'
        fi
      done | sort -u | tr '\n' ' ')
      if [ -z "$(echo "$ALL_CHANGED" | tr -d '[:space:]')" ]; then
        printf '{"committed":false,"crates_affected":"","changed_files":""}\n'
      else
        if [ -n "$CRATES" ]; then
          cargo clippy --all-targets --fix --allow-dirty --allow-staged $(printf -- '-p %s ' $CRATES) -- -D warnings 2>&1 || true
          cargo fmt --workspace 2>&1
        fi
        git add -A
        COMMIT_MSG_FILE=$(mktemp)
        cat > "$COMMIT_MSG_FILE" <<'__YGG_COMMIT_MSG__'
      {raw:Review.commit_message}
      __YGG_COMMIT_MSG__
        git commit -F "$COMMIT_MSG_FILE" --no-verify 2>&1 || true
        rm -f "$COMMIT_MSG_FILE"
        CHANGED_FILES=$(git diff --name-only HEAD~1 2>/dev/null | tr '\n' ' ')
        printf '{"committed":true,"crates_affected":"%s","changed_files":"%s"}\n' "$CRATES" "$CHANGED_FILES"
      fi
    parser: json
    routes:
      success: Run Checks (Review)
      failure: Run Checks (Review)

  - name: Run Checks (Review)
    kind: dispatch
    workflow: run-checks-and-tests
    inputs:
      scope: review
      crates_affected: "{Commit and Fix (Review).data.crates_affected}"
      changed_files: "{Commit and Fix (Review).data.changed_files}"
    routes:
      success: Done
      failure: Review

  # ═══════════════════════════════════════════════════════════════════════════
  # DONE + NOTIFY
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Done
    kind: execute
    command: |
      echo "Workflow complete: {input.brief.id} — {input.brief.title}"
    parser: exit-code
    routes:
      success: Notify
      failure: Notify

  - name: Notify
    kind: execute
    command: |
      MEMBER="{input.notify}"
      if [ -n "$MEMBER" ]; then
        RUN_NAME="{input.run-name}"
        BRIEF_ID="{input.brief.id}"
        MSG=$(cat <<'__MSG_END__'
      orchestrated-dev-v3 complete: {input.brief.id} — {input.brief.title}
      {?Dev.summary}Dev: {Dev.summary}{/}
      {?Harden.summary}Harden: {Harden.summary}{/}
      {?Review.summary}Review: {Review.summary}{/}
      __MSG_END__
      )
        collective send --as "Meridian" --to "$MEMBER" --subject "workflow complete: ${RUN_NAME:-$BRIEF_ID}" --message "$MSG" || true
      fi
      echo "Done"
    parser: exit-code
    routes:
      success: End
      failure: End

  - name: End
    kind: end
