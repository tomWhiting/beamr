name: run-checks-and-tests
description: Deterministic check cluster — cargo check, cargo test, tsc, biome, file-size. Pure check runner with no auto-fix side effects. Intended to be dispatched as a sub-workflow.

input:
  changed_files:
    type: text
    required: false
    description: Space-joined list of files changed (from the parent's Detect Changes step). Used to scope File Size Check; cargo checks scope by crate.
  crates_affected:
    type: text
    required: false
    description: Space-joined list of crate names to scope cargo check/test to. Empty string runs workspace-wide.

steps:
  - name: Cargo Check
    kind: execute
    command: |
      CRATES="{raw:input.crates_affected}"
      # When the caller didn't pass `crates_affected`, the template engine
      # leaves `{raw:input.crates_affected}` as a literal in the script.
      # `${VAR#\{}` strips a leading `{` if present; if the result differs
      # from the original, the value started with `{` (i.e. was unresolved)
      # and we fall back to workspace-wide.
      if [ "${CRATES#\{}" != "$CRATES" ]; then
        CRATES=""
      fi
      if [ -n "$(echo "$CRATES" | tr -d '[:space:]')" ]; then
        cargo check --all-targets --message-format=json -q $(printf -- '-p %s ' $CRATES)
      else
        cargo check --all-targets --message-format=json -q
      fi
    parser: rust-diagnostics
    routes:
      success: Cargo Clippy
      # On compile failure, clippy and cargo test both run their own check
      # pass and would only repeat the same diagnostics. Skip them and the
      # rust-only fmt step; jump to the JS-side checks (TS / Biome) and
      # File Size Check, which don't depend on rustc.
      failure: TS Check

  - name: Cargo Clippy
    kind: execute
    command: |
      CRATES="{raw:input.crates_affected}"
      # When the caller didn't pass `crates_affected`, the template engine
      # leaves `{raw:input.crates_affected}` as a literal in the script.
      # `${VAR#\{}` strips a leading `{` if present; if the result differs
      # from the original, the value started with `{` (i.e. was unresolved)
      # and we fall back to workspace-wide.
      if [ "${CRATES#\{}" != "$CRATES" ]; then
        CRATES=""
      fi
      if [ -n "$(echo "$CRATES" | tr -d '[:space:]')" ]; then
        cargo clippy --all-targets --message-format=json -q $(printf -- '-p %s ' $CRATES) -- -D warnings
      else
        cargo clippy --all-targets --message-format=json -q -- -D warnings
      fi
    parser: rust-diagnostics
    routes:
      success: Cargo Fmt Check
      failure: Cargo Fmt Check

  - name: Cargo Fmt Check
    kind: execute
    command: cargo fmt --all 2>&1; echo "exit:$?"
    parser: exit-code
    routes:
      success: Cargo Test
      failure: Cargo Test

  - name: Cargo Test
    kind: execute
    command: |
      CRATES="{raw:input.crates_affected}"
      if [ "${CRATES#\{}" != "$CRATES" ]; then
        CRATES=""
      fi
      # nextest's libtest-json-plus emits the same per-test event shape that
      # the rust-test-results parser already understands (one JSON object per
      # line on stdout; `event:"failed"` carries the panic body in `stdout`).
      # Stderr is left on stderr so cargo build errors aren't mixed into the
      # JSON stream — the runner captures both and the parser falls back to
      # text-format on combined output if no JSON events were seen.
      if [ -n "$(echo "$CRATES" | tr -d '[:space:]')" ]; then
        NEXTEST_EXPERIMENTAL_LIBTEST_JSON=1 cargo nextest run --cargo-quiet --message-format libtest-json-plus --show-progress none --no-fail-fast $(printf -- '-p %s ' $CRATES)
      else
        NEXTEST_EXPERIMENTAL_LIBTEST_JSON=1 cargo nextest run --cargo-quiet --message-format libtest-json-plus --show-progress none --no-fail-fast
      fi
    parser: rust-test-results
    routes:
      success: TS Check
      failure: TS Check

  - name: TS Check
    kind: execute
    command: cd apps/web && npx tsc --noEmit --pretty false 2>&1; echo "exit:$?"
    parser: exit-code
    routes:
      success: Biome Check
      failure: Biome Check

  - name: Biome Check
    kind: execute
    command: cd apps/web && npx biome check . 2>&1; echo "exit:$?"
    parser: exit-code
    routes:
      success: File Size Check
      failure: File Size Check

  - name: File Size Check
    kind: execute
    command: |
      CHANGED="{raw:input.changed_files}"
      # Same unresolved-template guard as Cargo Check / Cargo Clippy /
      # Cargo Test: when the caller didn't provide `changed_files`, fall
      # back to workspace-wide scanning instead of treating the literal
      # `{raw:...}` as a path filter.
      if [ "${CHANGED#\{}" != "$CHANGED" ]; then
        CHANGED=""
      fi
      # Source languages we actually author. Excludes vendored tree-sitter
      # grammars (categorised as "C") and generated asset JSON.
      LANGS='["Rust","TypeScript","TSX","JavaScript","JSX","Python"]'
      RAW=$(tokei --output json)
      VIOLATIONS=$(echo "$RAW" | jq -c \
        --argjson limit 500 \
        --argjson langs "$LANGS" \
        --arg changed "$CHANGED" '
        ($changed | split(" ") | map(select(length > 0))) as $changed_list |
        [ to_entries[]
          | select(.key as $k | $langs | index($k))
          | .value.reports[]?
          | select(.stats.code > $limit)
          | select(
              ($changed_list | length == 0)
              or (.name as $f | $changed_list | any(. as $c | $f | endswith($c)))
            )
          | {file: .name, loc: .stats.code}
        ] | sort_by(-.loc)')
      OVERSIZED=$(echo "$VIOLATIONS" | jq 'length' 2>/dev/null || echo 0)
      OVERSIZED=${OVERSIZED:-0}
      REPORT=$(echo "$VIOLATIONS" | jq -r 'map("- " + .file + " (" + (.loc | tostring) + " LoC)") | join("\n")' 2>/dev/null || echo '')
      if [ "$OVERSIZED" = "0" ]; then
        jq -nc --argjson limit 500 \
          '{violations: [], oversized: 0, limit: $limit, report: ""}'
        exit 0
      else
        jq -nc \
          --argjson v "$VIOLATIONS" \
          --argjson o "$OVERSIZED" \
          --argjson limit 500 \
          --arg r "$REPORT" \
          '{violations: $v, oversized: $o, limit: $limit, report: $r}'
        exit 1
      fi
    parser: json
    routes:
      success: Render Report
      failure: Render Report

  # The whole point of having structured parsers is that workflow authors
  # don't need bash + jq to assemble a report. The template engine provides
  # `{?Step.field > 0}…{/}` conditionals and `{raw:Step.field}` substitution
  # — and each parser already emits a `report` string built from its own
  # rendered diagnostic data. Render Report uses those primitives directly
  # to produce the failure-report markdown. No bash logic, no jq.
  - name: Render Report
    kind: execute
    command: |
      cat > /tmp/test-failure-report.md <<'__REPORT__'
      # Workflow check report

      ## Summary
      {?Cargo Check.error_count == 0}{raw:Cargo Check.error_count} check error(s), {raw:Cargo Check.warning_count} check warning(s), {raw:Cargo Clippy.error_count} clippy error(s), {raw:Cargo Clippy.warning_count} clippy warning(s), {raw:Cargo Test.failed} failing test(s), {raw:File Size Check.data.oversized} oversized file(s){/}{?Cargo Check.error_count > 0}Compile failed — {raw:Cargo Check.error_count} cargo check error(s), {raw:Cargo Check.warning_count} cargo check warning(s); clippy / fmt / test skipped (would only repeat the same compile errors). {raw:File Size Check.data.oversized} oversized file(s).{/}

      ## Failure Report (verbatim — what the retry prompt would receive)

      {?Cargo Check.error_count > 0}### Cargo Check ({raw:Cargo Check.error_count} error(s), {raw:Cargo Check.warning_count} warning(s))

      {raw:Cargo Check.report}

      {/}{?Cargo Clippy.error_count > 0}### Cargo Clippy --all-targets ({raw:Cargo Clippy.error_count} error(s), {raw:Cargo Clippy.warning_count} warning(s))

      {raw:Cargo Clippy.report}

      {/}{?Cargo Test.failed > 0}### Failing tests ({raw:Cargo Test.failed})

      {raw:Cargo Test.report}

      {/}{?File Size Check.data.oversized > 0}### Files exceeding 500 LoC ({raw:File Size Check.data.oversized})

      Split each into smaller modules.

      {raw:File Size Check.data.report}

      {/}__REPORT__
      echo "Wrote /tmp/test-failure-report.md"
    parser: exit-code
    routes:
      success: Overall Verdict
      failure: Overall Verdict

  - name: Overall Verdict
    kind: evaluate
    mode: check
    criteria: |
      {Cargo Check.success} == true
      {Cargo Clippy.success} == true
      {Cargo Fmt Check.success} == true
      {Cargo Test.success} == true
      {TS Check.success} == true
      {Biome Check.success} == true
      {File Size Check.success} == true

outputs:
  pass:
    type: boolean
    from: "{Overall Verdict.passed}"
  check_error_count:
    type: integer
    from: "{Cargo Check.error_count}"
  check_warning_count:
    type: integer
    from: "{Cargo Check.warning_count}"
  clippy_error_count:
    type: integer
    from: "{Cargo Clippy.error_count}"
  clippy_warning_count:
    type: integer
    from: "{Cargo Clippy.warning_count}"
  failed_tests:
    type: integer
    from: "{Cargo Test.failed}"
  failing_tests:
    type: array
    from: "{Cargo Test.failure_names}"
  oversized_files:
    type: integer
    from: "{File Size Check.data.oversized}"
