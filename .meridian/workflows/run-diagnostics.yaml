name: run-diagnostics
description: Run cargo + frontend checks, DM the report to a member. Self-service only.

input:
  member:
    type: text
    required: true
  crates:
    type: text
    required: false

steps:
  - name: Cargo Check
    kind: execute
    command: cargo check --all-targets --message-format=json -q
    parser: rust-diagnostics
    routes: { success: Cargo Clippy, failure: Cargo Clippy }

  - name: Cargo Clippy
    kind: execute
    command: cargo clippy --all-targets --message-format=json -q -- -D warnings
    parser: rust-diagnostics
    routes: { success: Cargo Test, failure: Cargo Test }

  - name: Cargo Test
    kind: execute
    command: NEXTEST_EXPERIMENTAL_LIBTEST_JSON=1 cargo nextest run --cargo-quiet --message-format libtest-json-plus --show-progress none --no-fail-fast
    parser: rust-test-results
    routes: { success: Send, failure: Send }

  - name: Send
    kind: execute
    command: |
      MSG="Cargo Check: {Cargo Check.error_count}E/{Cargo Check.warning_count}W. Cargo Clippy: {Cargo Clippy.error_count}E/{Cargo Clippy.warning_count}W. Cargo Test: {Cargo Test.failed} failures."
      collective send --as "Meridian" --to "{raw:input.member}" --message "$MSG"
    parser: exit-code
    routes: { success: Done, failure: Done }

  - name: Done
    kind: end
