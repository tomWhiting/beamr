name: review-request
description: Request reviews from a set of reviewers on a branch. Composes `meridian review request` (brief 177), which performs GitHub reviewer requests, DMs each reviewer, and persists the pending-reviewer set against the branch lifecycle. One-shot — does NOT poll for verdicts. The pipeline coordinator's await-review-complete stage is responsible for waiting.

# `reviewers` arrives as a space-joined string after template
# expansion (arrays flatten at dispatch boundaries). The shell loop
# below iterates that list and issues one `meridian review request`
# per reviewer. That verb is repeatable-safe on GitHub (deduplicated
# upstream) and sends the DM through the messaging service.
input:
  branch:
    type: text
    required: true
    description: Branch to request reviews on.
  reviewers:
    type: text
    required: true
    description: Space-joined list of reviewer designations (member IDs or display names).
  brief:
    type: text
    required: false
    description: Short brief summary to include in the DM body. When empty, the default DM body from `meridian review request` is used.

steps:
  # Step 1 — request reviews (GitHub + DM + pending-set persistence)
  # in one call per reviewer. `{raw:input.reviewers}` bypasses shell
  # escaping so the space-separated list word-splits naturally inside
  # the `for` loop. The default DM body is used when `input.brief` is
  # empty; otherwise a short prefix is added.
  #
  # `set -e` makes any `meridian review request` failure abort the
  # loop with a non-zero exit code. Without it, a failed request
  # would be silently skipped: the caller would see `requested:
  # ["@alice"]` with no indication that `@bob` was never reached,
  # and the coordinator would advance the pipeline as if all
  # reviewers had been requested. The step MUST fail loud so the
  # coordinator routes to the dispatch-failure branch and an
  # operator investigates.
  - name: Request Reviews
    kind: execute
    command: >-
      set -e;
      REVIEWERS="{raw:input.reviewers}";
      BRANCH="{input.branch}";
      BRIEF="";
      {?input.brief}BRIEF="{input.brief}";{/}
      if [ -z "$(printf '%s' "$REVIEWERS" | tr -d '[:space:]')" ]; then
      echo "review-request: no reviewers supplied — input.reviewers is empty" >&2;
      exit 1;
      fi;
      REQUESTED="";
      for R in $REVIEWERS; do
      if [ -n "$BRIEF" ]; then
      meridian review request "$BRANCH" --reviewer "$R" --message "Please review PR $BRANCH. Brief: $BRIEF. Use \`meridian review complete\` when done." >/dev/null;
      else
      meridian review request "$BRANCH" --reviewer "$R" >/dev/null;
      fi;
      REQUESTED="$REQUESTED $R";
      done;
      TS=$(date -u +%Y-%m-%dT%H:%M:%SZ);
      REQ_JSON=$(printf '%s' "$REQUESTED" | jq -R -s -c 'split(" ") | map(select(length > 0))');
      jq -nc --argjson requested "$REQ_JSON" --arg requested_at "$TS"
      '{requested: $requested, requested_at: $requested_at}'
    parser: json
    routes:
      success: Record Request
      failure: Record Request

  # Terminal step — a trivial check that the request succeeded (at
  # least one reviewer made it through). The engine maps this step's
  # outcome to the workflow's success/failure status, which the
  # parent DispatchExecutor routes on.
  - name: Record Request
    kind: evaluate
    mode: check
    criteria: |
      {Request Reviews.success} == true

outputs:
  requested:
    type: array
    from: "{Request Reviews.data.requested}"
  requested_at:
    type: string
    from: "{Request Reviews.data.requested_at}"
