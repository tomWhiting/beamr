name: review-synthesize
description: Classify review inputs (mechanical findings, human PR comments, verdict summaries) into a binary outcome — clean or needs_fix. When needs_fix, dispatches the review-fix workflow to address findings. When clean, reaches Done and reports the outcome to the coordinator. This workflow DOES NOT decide whether the branch lands — the pipeline coordinator reads `outcome` and drives the lifecycle transition.

input:
  branch:
    type: text
    required: true
    description: Branch under review.
  brief:
    type: text
    required: true
    description: Originating brief — context for the synthesizer.
  diff:
    type: text
    required: false
    description: The unified diff the reviewers read. Passed through to review-fix when needs_fix.
  mechanical_findings:
    type: text
    required: false
    description: Structured findings array from mechanical-review.yaml (security + silent-failure + convention).
  human_comments:
    type: text
    required: false
    description: Human reviewer comments (from `meridian review threads` or PR comment bodies).
  verdict_summary:
    type: text
    required: false
    description: Verdict summary object (from `meridian review summary`) — the set of verdicts submitted by requested reviewers.

steps:
  - name: Classify Findings
    kind: action
    target: function
    profile: review-synthesizer
    output_schema: |
      {
        "type": "object",
        "properties": {
          "outcome": {"type": "string", "enum": ["clean", "needs_fix"]},
          "findings_to_address": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "file": {"type": ["string", "null"]},
                "line": {"type": ["integer", "null"]},
                "source": {"type": "string", "enum": ["mechanical", "human_comment", "verdict"]},
                "reviewer_role": {"type": ["string", "null"]},
                "description": {"type": "string"},
                "citation": {"type": ["string", "null"]}
              },
              "required": ["source", "description"]
            }
          },
          "findings_count": {"type": "integer"},
          "summary": {"type": "string"}
        },
        "required": ["outcome", "findings_to_address", "findings_count", "summary"]
      }
    prompt: |
      You are the review synthesizer. Classify the inputs below into a single binary outcome — `clean` or `needs_fix`. Do NOT discover new findings; only classify what has already been reported.

      Branch: {input.branch}
      Brief: {input.brief}

      Mechanical findings (security, silent-failure, convention reviewers):
      {input.mechanical_findings}

      Human PR comments:
      {input.human_comments}

      Verdict summary (per-reviewer verdicts):
      {input.verdict_summary}

      Rule: any mechanical finding OR any `request_changes` verdict OR any human comment that unambiguously identifies a problem to fix → `needs_fix`. Otherwise → `clean`.

      `findings_count` MUST equal the length of `findings_to_address`.

      ## RESPONSE FORMAT

      Your entire response MUST be a single JSON object matching the output_schema above, and nothing else — no prose commentary, no markdown code fences, no preamble. Start with `{` and end with `}`.
    routes:
      success: Route Decision
      failure: Route Decision

  # Binary branch: clean outcome → Done; otherwise → dispatch review-fix.
  # Depends on brief 169 (evaluate literal-left resolution) for the
  # left-hand side to be parsed as a string literal after template
  # expansion. The surrounding double quotes in the YAML source are
  # literal — they produce `"clean" == "clean"` after expansion so
  # the evaluator's `parse_literal` reads both sides symmetrically
  # as JSON string values. Without the quotes, the left would expand
  # to the bare word `clean`, which `resolve_dot_path` treats as an
  # unresolved step reference (→ Value::Null) and the comparison
  # would always fail — making the workflow route to Dispatch Review
  # Fix for every invocation regardless of outcome.
  - name: Route Decision
    kind: evaluate
    mode: check
    criteria: |
      "{Classify Findings.outcome}" == "clean"
    routes:
      success: Done
      failure: Dispatch Review Fix

  # Terminal step on the clean path. `kind: end` terminates the
  # workflow immediately with its step outcome (always Passed),
  # which maps to OrchestrationStatus::Completed.
  #
  # Positioned BEFORE Dispatch Review Fix in the step list so the
  # dispatch step can sit in the terminal slot (last in file) for
  # the needs_fix path — see note on that step for why ordering
  # matters.
  - name: Done
    kind: end

  # Conditional dispatch — only taken when Route Decision failed,
  # i.e. outcome == "needs_fix". Hands findings_to_address to
  # review-fix as its `findings` input; the original diff travels
  # along as `original_diff` for developer context.
  #
  # MUST be the last step in the file. The engine routes to this
  # step by name from Route Decision.failure; because the step has
  # no outgoing routes and no subsequent step in the list, the
  # engine evaluates NextStep::End preserving the dispatch step's
  # own Passed/Failed outcome. If Dispatch Review Fix sat BEFORE
  # Done, a failed review-fix would fall through to Done (always
  # Passed) and the synthesize workflow would erroneously report
  # success.
  - name: Dispatch Review Fix
    kind: dispatch
    workflow: review-fix
    inputs:
      branch: "{input.branch}"
      brief: "{input.brief}"
      original_diff: "{input.diff}"
      findings: "{Classify Findings.findings_to_address}"

outputs:
  outcome:
    type: string
    from: "{Classify Findings.outcome}"
  findings_count:
    type: integer
    from: "{Classify Findings.findings_count}"
  summary:
    type: string
    from: "{Classify Findings.summary}"
