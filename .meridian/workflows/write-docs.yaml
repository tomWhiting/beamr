name: write-docs
description: Generate user documentation with parallel research and writing — produces structured guides with Mermaid diagrams

input:
  target:
    type: string
    required: true
    description: What to document — a crate name, directory path, feature area, or "all" for the full project
  output_dir:
    type: string
    required: false
    default: docs/user-guide
    description: Directory to write documentation files to

worksite: auto

steps:
  - name: Plan
    kind: action
    target: function
    profile: planner
    output_schema: |
      {
        "type": "object",
        "properties": {
          "sections": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "id": {"type": "string", "description": "Short identifier (e.g. getting-started, architecture, api-reference)"},
                "title": {"type": "string", "description": "Human-readable section title"},
                "filename": {"type": "string", "description": "Output filename (e.g. getting-started.md)"},
                "description": {"type": "string", "description": "What this section covers"},
                "crate_or_path": {"type": "string", "description": "Primary crate or directory path to document"},
                "depends_on": {
                  "type": "array",
                  "items": {"type": "string"},
                  "description": "IDs of sections that should be written first (for cross-references)"
                },
                "key_files": {
                  "type": "array",
                  "items": {"type": "string"},
                  "description": "Important source files to examine"
                }
              },
              "required": ["id", "title", "filename", "description", "crate_or_path", "depends_on"]
            }
          },
          "project_overview": {"type": "string", "description": "Brief overview of what's being documented"},
          "audience": {"type": "string", "description": "Target audience for the documentation"}
        },
        "required": ["sections", "project_overview", "audience"]
      }
    prompt: |
      You are a documentation architect planning a comprehensive user guide.

      Target to document: {input.target}
      Output directory: {input.output_dir}

      Analyse the codebase and plan documentation sections. Each section should be a self-contained guide that can be written independently.

      Rules:
      - Create logical sections that cover the target comprehensively
      - Include a getting-started/overview section with no dependencies
      - Use depends_on to ensure foundational sections are written before advanced ones
      - Identify the key source files that each section needs to examine
      - Sections with no dependencies can be researched and written in parallel
      - Target audience should be developers who want to use or contribute to this software
      - Plan for Mermaid diagrams where architecture or flow visualisation would help

      Do NOT write any documentation. Only output the structured plan.
    routes:
      success: Research
      failure: Done

  - name: Research
    kind: action
    target: function
    profile: codebase-explorer
    for_each: "{Plan.sections}"
    parallel: true
    output_schema: |
      {
        "type": "object",
        "properties": {
          "section_id": {"type": "string"},
          "summary": {"type": "string", "description": "What this area does and why it matters"},
          "architecture": {"type": "string", "description": "How the components fit together — describe flows suitable for Mermaid diagrams"},
          "key_types": {
            "type": "array",
            "items": {"type": "string"},
            "description": "Important types, traits, and structs with brief descriptions"
          },
          "public_api": {
            "type": "array",
            "items": {"type": "string"},
            "description": "Public functions, endpoints, or CLI commands with signatures"
          },
          "usage_examples": {
            "type": "array",
            "items": {"type": "string"},
            "description": "Real usage patterns found in the codebase or tests"
          },
          "gotchas": {
            "type": "array",
            "items": {"type": "string"},
            "description": "Non-obvious behaviour, edge cases, or common pitfalls"
          },
          "related_sections": {
            "type": "array",
            "items": {"type": "string"},
            "description": "Other section IDs this section should cross-reference"
          }
        },
        "required": ["section_id", "summary", "architecture", "key_types", "public_api"]
      }
    prompt: |
      Research the codebase to gather all information needed to write documentation for this section.

      Section: {item.id} — {item.title}
      Description: {item.description}
      Primary crate/path: {item.crate_or_path}
      Key files to examine: {item.key_files}

      Be thorough:
      1. Read the actual source code — don't guess
      2. Trace the architecture and data flow
      3. Find real usage examples in tests or other crates
      4. Note any Mermaid-diagram-worthy flows (request handling, data pipelines, state machines)
      5. Identify cross-references to other documentation sections
      6. Note gotchas and non-obvious behaviour

      Do NOT write documentation. Only research and report structured findings.
    routes:
      success: Write
      failure: Done

  - name: Write
    kind: action
    target: function
    profile: executor
    for_each: "{Plan.sections}"
    parallel: true
    depends_on_field: depends_on
    id_field: id
    select:
      section: "{item}"
      research: "{Research.results[index]}"
      plan: "{Plan}"
    prompt: |
      Write a documentation section based on thorough research findings.

      Section: {section.title}
      Filename: {section.filename}
      Target audience: {plan.audience}

      Research findings:
      Summary: {research.summary}
      Architecture: {research.architecture}
      Key types: {research.key_types}
      Public API: {research.public_api}
      Usage examples: {research.usage_examples}
      Gotchas: {research.gotchas}
      Related sections: {research.related_sections}

      Write the documentation to: {input.output_dir}/{section.filename}

      Documentation standards:
      - Use clear, professional Markdown
      - Include Mermaid diagrams (```mermaid) for architecture and flows — NOT ASCII art
      - Use proper heading hierarchy (# for title, ## for major sections, ### for subsections)
      - Include code examples with syntax highlighting
      - Add cross-reference links to related sections: [Section Title](./{other_filename})
      - Include a table of contents at the top for sections longer than 3 headings
      - Write for the target audience — assume they know the language but not this codebase
      - End each section with a "See Also" or "Related" links block

      Write the actual documentation file. Use the Write tool to create the file.
    output_schema: |
      {
        "type": "object",
        "properties": {
          "section_id": {"type": "string"},
          "filename": {"type": "string"},
          "word_count": {"type": "number"},
          "diagrams_included": {"type": "number", "description": "Number of Mermaid diagrams"},
          "status": {
            "type": "string",
            "enum": ["complete", "partial", "failed"]
          }
        },
        "required": ["section_id", "filename", "status"]
      }
    routes:
      success: Review
      failure: Done

  - name: Review
    kind: action
    target: function
    profile: code-reviewer
    select:
      plan: "{Plan}"
      research: "{Research.results}"
      writing: "{Write.results}"
    output_schema: |
      {
        "type": "object",
        "properties": {
          "overall_quality": {
            "type": "string",
            "enum": ["excellent", "good", "needs-work", "poor"]
          },
          "sections_reviewed": {"type": "number"},
          "issues_found": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "section": {"type": "string"},
                "severity": {"type": "string", "enum": ["critical", "important", "suggestion"]},
                "description": {"type": "string"}
              },
              "required": ["section", "severity", "description"]
            }
          },
          "summary": {"type": "string", "description": "Overall documentation quality summary"},
          "missing_topics": {
            "type": "array",
            "items": {"type": "string"},
            "description": "Important topics that should be documented but weren't covered"
          }
        },
        "required": ["overall_quality", "sections_reviewed", "issues_found", "summary"]
      }
    prompt: |
      Review all generated documentation for quality, accuracy, and completeness.

      Plan: {plan.project_overview}
      Target audience: {plan.audience}

      Writing results: {writing}

      Read each generated documentation file and review:
      1. **Accuracy** — Does the documentation match the actual code?
      2. **Completeness** — Are important features and edge cases covered?
      3. **Consistency** — Do sections use consistent terminology and formatting?
      4. **Diagrams** — Are Mermaid diagrams correct and helpful? (NOT ASCII art)
      5. **Cross-references** — Do links between sections work and make sense?
      6. **Readability** — Is it well-organised and easy to follow?
      7. **Examples** — Are code examples correct and runnable?

      Fix any critical or important issues directly in the files. Report all findings.
    routes:
      success: Done
      failure: Done

  - name: Done
    kind: end
