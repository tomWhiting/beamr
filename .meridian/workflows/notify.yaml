name: notify
description: |
  End-of-workflow notification. Posts a DM to the team-lead and human-lead
  with branch, build status (errors + warnings from `cargo check`), and a
  lint-suppression hygiene delta computed against `origin/main` for the
  Rust files touched on this branch. Designed to be dispatched from a
  parent workflow's terminal step — not run on its own.

input:
  workflow:
    type: text
    required: false
    description: |
      Name of the workflow that triggered this notification
      (e.g. `orchestrated-dev`).
  run-name:
    type: text
    required: false
    description: |
      Operator-supplied run label (the `-n / --name` flag) so the
      message identifies which run it relates to. Optional — if empty
      the message just shows the workflow name.

steps:
  # ─── Capture context ────────────────────────────────────────────────────
  - name: BRANCH
    kind: execute
    command: >-
      git branch --show-current
    parser: lines
    routes:
      success: Check
      failure: Check

  # ─── Build snapshot ─────────────────────────────────────────────────────
  - name: Check
    kind: execute
    command: >-
      cargo check --all-targets --message-format=json -q
    parser: rust-diagnostics
    extract:
      - error_count
      - warning_count
    routes:
      success: Audit
      failure: Audit

  # ─── Lint-suppression hygiene delta vs origin/main ──────────────────────
  # Counts what changed on the branch relative to origin/main:
  # - allow(dead_code) net delta across touched .rs files
  # - allow(unused_*) lines added
  # - panic-class lines added (unwrap/expect/panic!/todo!/unimplemented!)
  # Output is a multi-line block the Notify step embeds verbatim.
  - name: Audit
    kind: execute
    command: |
      set -u
      TOUCHED=$(git diff --name-only origin/main...HEAD -- '*.rs' 2>/dev/null || true)
      if [ -z "$TOUCHED" ]; then
        echo "Touched: 0 Rust files"
        echo "Lint-suppression delta: n/a"
        exit 0
      fi

      file_count=$(printf '%s\n' "$TOUCHED" | wc -l | tr -d ' ')

      new_dead=0
      base_dead=0
      while IFS= read -r f; do
        [ -z "$f" ] && continue
        if [ -f "$f" ]; then
          n=$(grep -c 'allow(dead_code)' "$f" 2>/dev/null || echo 0)
          new_dead=$((new_dead + n))
        fi
        if git cat-file -e "origin/main:$f" 2>/dev/null; then
          b=$(git show "origin/main:$f" 2>/dev/null | grep -c 'allow(dead_code)' || echo 0)
          base_dead=$((base_dead + b))
        fi
      done <<<"$TOUCHED"
      dead_delta=$((new_dead - base_dead))

      diff_added=$(git diff origin/main...HEAD -- '*.rs' 2>/dev/null | grep -E '^\+[^+]' || true)
      unused_added=$(printf '%s\n' "$diff_added" | grep -cE 'allow\(unused' || true)
      panic_added=$(printf '%s\n' "$diff_added" | grep -cE '\.unwrap\(\)|\.expect\(|panic!\(|todo!\(|unimplemented!\(' || true)

      [ -z "$unused_added" ] && unused_added=0
      [ -z "$panic_added" ] && panic_added=0

      printf 'Touched: %s Rust files\n' "$file_count"
      printf 'Lint-suppression delta vs origin/main:\n'
      if [ "$dead_delta" -gt 0 ]; then
        printf '  allow(dead_code): +%s\n' "$dead_delta"
      else
        printf '  allow(dead_code): %s\n' "$dead_delta"
      fi
      printf '  allow(unused_*) added: +%s\n' "$unused_added"
      printf '  panic-class added: +%s (unwrap/expect/panic!/todo!/unimplemented!)\n' "$panic_added"
    parser: lines
    routes:
      success: Notify
      failure: Notify

  # ─── Send DMs to team-lead + human-lead ─────────────────────────────────
  # Two `collective send` calls in one step body so a single Notify step
  # reaches both recipients. Failure of one send doesn't block the other —
  # the `||` keeps the second send attempt running even if the first errs.
  - name: Notify
    kind: execute
    command: |
      MSG="[auto-notification] {input.workflow} run \"{input.run-name}\" finished on \`{raw:BRANCH.lines}\`.

      Build: {Check.error_count} errors, {Check.warning_count} warnings.

      {raw:Audit.lines}

      Next: review the branch and \`meridian stack land --branch {raw:BRANCH.lines} --workspace 2d5fdd51-1f25-45a4-8f86-4d4c978d1355 --strategy squash\` when clean."

      collective send --as "Meridian" --to "Waffles the Terrible" --message "$MSG" || true
      collective send --as "Meridian" --to "Tom" --message "$MSG" || true
    parser: exit-code
    routes:
      success: Done
      failure: Done

  - name: Done
    kind: end
