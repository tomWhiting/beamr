name: smell-and-criterion-review
description: |
  Smell test + criterion review — tuned for design-doc-driven clusters.
  Smell Test catches repo-consistency violations and practical gaps the
  compiler can't. Criterion Review verifies the implementation per-R#
  against the brief, DESIGN.md, CHECKLIST, and USER-STORIES.

input:
  changed_files:
    type: text
    required: false
  crates_affected:
    type: text
    required: false
  brief:
    type: text
    required: true
  requirements:
    type: text
    required: false
    description: Plan.requirements — the per-R# array from the orchestrating workflow's planner.
  implement_summary:
    type: text
    required: false
    description: Implement.summary — orienting digest of what the implementer did.
  harden_summary:
    type: text
    required: false
    description: Harden.summary — orienting digest of what the hardener verified and fixed.
  harden_requirements:
    type: text
    required: false
    description: Harden's per-R# verdicts with nested CHECKLIST and USER-STORY verdicts.
  harden_design_divergences:
    type: text
    required: false
    description: Cross-cutting design divergences Harden caught and (typically) fixed.
  harden_concerns:
    type: text
    required: false
    description: Cross-cutting concerns Harden flagged but couldn't fully resolve.

steps:
  - name: Smell Test
    kind: action
    target: function
    profile: code-reviewer
    output_schema: |
      {
        "type": "object",
        "properties": {
          "pass": {"type": "boolean"},
          "summary": {"type": "string"},
          "issues": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "severity": {"type": "string", "enum": ["blocking", "important", "minor"]},
                "category": {"type": "string"},
                "file": {"type": "string"},
                "description": {"type": "string"},
                "fix_applied": {"type": "string", "description": "Empty string if you did not fix; otherwise what you changed."}
              },
              "required": ["severity", "category", "file", "description", "fix_applied"]
            }
          }
        },
        "required": ["pass", "summary", "issues"]
      }
    prompt: |
      Smell test the changes. Deterministic checks have already passed — you're catching what the compiler can't.

      Files changed: {input.changed_files}
      Crates affected: {input.crates_affected}

      Apply the Exists / Substantive / Wired check to every artifact the brief delivered. Cite sibling files by path when you flag a consistency divergence. Bypass attempts (`#[allow]`, `#[expect]`, `#[ignore]`, `_var` renames, `#[cfg(any())]`) are blocking even if checks passed. Fix what you find directly; mark `fix_applied` accordingly.

      Pass = true only when zero unfixed blocking issues remain.
    routes:
      success: Smell Verdict
      failure: Criterion Review

  - name: Smell Verdict
    kind: evaluate
    mode: check
    criteria: |
      {Smell Test.pass} == true
    routes:
      success: Criterion Review
      failure: Compute Verdict

  - name: Criterion Review
    kind: action
    target: function
    profile: criterion-reviewer
    output_schema: |
      {
        "type": "object",
        "properties": {
          "pass": {"type": "boolean"},
          "summary": {
            "type": "string",
            "description": "1-2 sentences. Goes verbatim into Harden's retry prompt as orienting context."
          },
          "commit_message": {
            "type": "string",
            "description": "Conventional-commits-style title (and optional body, separated by a blank line). Used by Commit Auto-Fix (Review) when the workflow commits your changes."
          },
          "requirements": {
            "type": "array",
            "description": "One entry per R# from the plan. Every R# must appear.",
            "items": {
              "type": "object",
              "properties": {
                "id": {"type": "string"},
                "verdict": {"type": "string", "enum": ["confirmed", "fixed", "disputed", "unverifiable"]},
                "checklist": {
                  "type": "array",
                  "description": "Verdict per CHECKLIST id this R# realises.",
                  "items": {
                    "type": "object",
                    "properties": {
                      "id": {"type": "string"},
                      "verdict": {"type": "string", "enum": ["confirmed", "fixed", "disputed", "not_realised"]},
                      "note": {"type": "string", "description": "One-line: file:line evidence, what you fixed, or why it's disputed/not_realised."}
                    },
                    "required": ["id", "verdict", "note"]
                  }
                },
                "stories": {
                  "type": "array",
                  "description": "Verdict per USER-STORY id this R# satisfies.",
                  "items": {
                    "type": "object",
                    "properties": {
                      "id": {"type": "string"},
                      "verdict": {"type": "string", "enum": ["confirmed", "fixed", "disputed", "not_satisfied"]},
                      "note": {"type": "string"}
                    },
                    "required": ["id", "verdict", "note"]
                  }
                },
                "fix_applied": {
                  "type": "string",
                  "description": "Empty string if verdict is confirmed. Otherwise: what was wrong + what you changed."
                }
              },
              "required": ["id", "verdict", "checklist", "stories", "fix_applied"]
            }
          },
          "design_alignment": {
            "type": "object",
            "properties": {
              "verdict": {"type": "string", "enum": ["aligned", "minor_divergence", "material_divergence"]},
              "notes": {"type": "string"}
            },
            "required": ["verdict", "notes"]
          },
          "blockers": {
            "type": "array",
            "items": {"type": "string"}
          }
        },
        "required": ["pass", "summary", "commit_message", "requirements", "design_alignment", "blockers"]
      }
    prompt: |
      Verify whether the implementation actually delivers the brief. Deterministic checks + smell test have passed — you're not re-running those.

      Brief: {input.brief}
      Files changed: {input.changed_files}

      Plan requirements: {input.requirements}
      Implementer's summary: {input.implement_summary}
      Hardener's summary: {input.harden_summary}
      Hardener's per-R# verdicts: {input.harden_requirements}
      Hardener's design divergences: {input.harden_design_divergences}
      Hardener's concerns: {input.harden_concerns}

      Don't trust prior agents' claims — open the changed files and verify each R# end-to-end. For each R#: trace the requirement to the code, check the CHECKLIST ids it realises against the cited code, check the USER-STORY ids it satisfies. Audit design alignment overall. Hunt silent failures, incomplete work, broken data flows, and bypass attempts.

      Fix what you find directly and mark verdict `fixed`; the workflow re-runs deterministic checks after you. Draft the commit message — the workflow uses it when committing your changes.
    routes:
      success: Compute Verdict
      failure: Compute Verdict

  - name: Compute Verdict
    kind: evaluate
    mode: check
    criteria: |
      {Criterion Review.pass} == true

outputs:
  pass:
    type: boolean
    from: "{Compute Verdict.passed}"
  summary:
    type: string
    from: "{Criterion Review.summary}"
  commit_message:
    type: string
    from: "{Criterion Review.commit_message}"
  findings:
    type: array
    from: "{Criterion Review.requirements}"
  design_alignment_verdict:
    type: string
    from: "{Criterion Review.design_alignment.verdict}"
  blockers:
    type: array
    from: "{Criterion Review.blockers}"
