name: test-enrichment
description: |
  Progressive enrichment prototype with planner + task priming.
  Tests: {#each} iteration, {{@file}} inclusion, {{!`cmd`}} execution,
  merge: directive, task_list_id priming.

input:
  brief:
    type: text
    required: true
    description: Brief JSON content (parsed at seed time).
  notify:
    type: text
    required: false
    description: Member name to notify on completion (receives a DM).

steps:
  # ═══════════════════════════════════════════════════════════════════════════
  # SCOUT — enrich each R# with codebase context
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Scout
    kind: action
    target: function
    profile: test-scout
    output_schema: |
      {
        "type": "object",
        "properties": {
          "summary": {
            "type": "string",
            "description": "2-3 sentences orienting the implementer."
          },
          "enrichments": {
            "type": "array",
            "description": "One entry per R# in the brief.",
            "items": {
              "type": "object",
              "properties": {
                "id": {"type": "string", "description": "R# id from the brief"},
                "patterns": {"type": "array", "items": {"type": "string"}},
                "existing_api": {"type": "array", "items": {"type": "string"}},
                "gotchas": {"type": "array", "items": {"type": "string"}}
              },
              "required": ["id", "patterns", "existing_api", "gotchas"]
            }
          }
        },
        "required": ["summary", "enrichments"]
      }
    prompt: |
      Explore the codebase and enrich each requirement with context.

      For each R# in the brief, find:
      - Patterns: sibling files demonstrating the convention to follow
      - Existing API: types/functions from existing code to build on
      - Gotchas: non-obvious findings

      Do NOT restate the requirements.

      ## Design Reference (file inclusion test)

      {{@.meridian/design-system/README.md}}

      ## Current Crate Structure (command execution test)

      {{!`ls crates/ | head -10`}}

      # {input.brief.id}: {input.brief.title}

      ## Purpose

      {input.brief.purpose}

      ## Task

      {input.brief.task}

      ## Requirements

      {#each input.brief.requirements as r}
      ### {r.id}: {r.title}

      {r.spec}

      Acceptance:
      {#each r.acceptance as a}
      - {a}
      {/each}
      {/each}
    merge:
      from: enrichments
      into: input.brief.requirements
      key: id
    routes:
      success: Plan
      failure: End

  # ═══════════════════════════════════════════════════════════════════════════
  # PLAN — generate implementation tasks for each requirement
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Plan
    kind: action
    target: function
    profile: test-scout
    output_schema: |
      {
        "type": "object",
        "properties": {
          "tasks": {
            "type": "array",
            "description": "Ordered implementation tasks matching Claude Code task file format.",
            "items": {
              "type": "object",
              "properties": {
                "id": {"type": "string", "description": "Sequential number as string: 1, 2, 3..."},
                "subject": {"type": "string", "description": "Short task title (imperative form, under 80 chars)."},
                "description": {"type": "string", "description": "What to do — specific enough to execute without questions."},
                "activeForm": {"type": "string", "description": "Present continuous form shown in spinner (e.g. 'Moving StorageError to libmessage')."},
                "status": {"type": "string", "enum": ["pending"], "description": "Always 'pending' — the developer marks them complete."},
                "blocks": {"type": "array", "items": {"type": "string"}, "description": "Task IDs this task blocks (empty if none)."},
                "blockedBy": {"type": "array", "items": {"type": "string"}, "description": "Task IDs that must complete first (empty if none)."}
              },
              "required": ["id", "subject", "description", "activeForm", "status", "blocks", "blockedBy"]
            }
          }
        },
        "required": ["tasks"]
      }
    prompt: |
      Plan the implementation as ordered tasks. Be specific.

      # {input.brief.id}: {input.brief.title}

      ## Task

      {input.brief.task}

      ## Requirements (with scout context)

      {#each input.brief.requirements as r}
      ### {r.id}: {r.title}

      {r.spec}

      {?r.patterns}Patterns: {r.patterns[*]}{/}
      {?r.existing_api}Existing API: {r.existing_api[*]}{/}
      {?r.gotchas}Gotchas: {r.gotchas[*]}{/}
      {/each}

      Output an ordered array of tasks with dependency info.
    routes:
      success: Create Tasks
      failure: End

  # ═══════════════════════════════════════════════════════════════════════════
  # CREATE TASKS — write task files for task_list_id priming
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Create Tasks
    kind: execute
    command: |
      TASK_DIR="$HOME/.claude/tasks/test-enrichment-run"
      rm -rf "$TASK_DIR"
      mkdir -p "$TASK_DIR"
      TMPJSON=$(mktemp)
      cat > "$TMPJSON" <<'__YGG_TASKS_END__'
      {raw:Plan.tasks}
      __YGG_TASKS_END__
      TOTAL=$(jq length "$TMPJSON")
      for i in $(seq 0 $((TOTAL - 1))); do
        ID=$(jq -r ".[$i].id" "$TMPJSON")
        SUBJECT=$(jq -r ".[$i].subject" "$TMPJSON")
        jq ".[$i]" "$TMPJSON" > "$TASK_DIR/$ID.json"
        echo "Created task $ID: $SUBJECT"
      done
      rm -f "$TMPJSON"
      echo "Total: $TOTAL tasks created"
    parser: lines
    routes:
      success: Dev
      failure: End

  # ═══════════════════════════════════════════════════════════════════════════
  # DEV — implement with tasks pre-loaded
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Dev
    kind: action
    target: function
    profile: test-developer
    task_list_id: "test-enrichment-run"
    output_schema: |
      {
        "type": "object",
        "properties": {
          "summary": {"type": "string"},
          "commit_message": {"type": "string"},
          "requirements": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "id": {"type": "string"},
                "status": {"type": "string", "enum": ["implemented", "blocked"]},
                "dev_notes": {"type": "string"}
              },
              "required": ["id", "status", "dev_notes"]
            }
          }
        },
        "required": ["summary", "commit_message", "requirements"]
      }
    prompt: |
      Implement the brief. Your task list has been populated — use TaskList
      to see tasks and work through them. Mark each completed as you go.

      # {input.brief.id}: {input.brief.title}

      ## Purpose

      {input.brief.purpose}

      ## Task

      {input.brief.task}

      ## Requirements

      {#each input.brief.requirements as r}
      ### {r.id}: {r.title}

      {r.spec}

      {?r.patterns}**Patterns:** {r.patterns[*]}{/}
      {?r.existing_api}**Existing API:** {r.existing_api[*]}{/}
      {?r.gotchas}**Gotchas:** {r.gotchas[*]}{/}
      {/each}

      ## Scout Summary

      {Scout.summary}
    routes:
      success: Save Output
      failure: End

  - name: Save Output
    kind: execute
    command: |
      mkdir -p .meridian/stage-output
      cat > .meridian/stage-output/scout.json <<'__SCOUT_END__'
      {raw:Scout.enrichments}
      __SCOUT_END__
      cat > .meridian/stage-output/plan.json <<'__PLAN_END__'
      {raw:Plan.tasks}
      __PLAN_END__
      cat > .meridian/stage-output/dev.json <<'__DEV_END__'
      {raw:Dev.requirements}
      __DEV_END__
      echo "Outputs saved"
    parser: exit-code
    routes:
      success: Notify
      failure: Notify

  # ═══════════════════════════════════════════════════════════════════════════
  # NOTIFY — send completion DM if member specified
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Notify
    kind: execute
    command: |
      MEMBER="{input.notify}"
      if [ -n "$MEMBER" ]; then
        MSG=$(cat <<'__MSG_END__'
      Workflow test-enrichment finished for {input.brief.id}: {input.brief.title}.
      Dev commit: {Dev.commit_message}
      __MSG_END__
      )
        collective send --as "Meridian" --to "$MEMBER" --subject "test-enrichment complete" --message "$MSG" || true
        echo "Notified $MEMBER"
      fi
      echo "Done"
    parser: exit-code
    routes:
      success: End
      failure: End

  - name: End
    kind: end
