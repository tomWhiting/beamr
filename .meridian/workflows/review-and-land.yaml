name: review-and-land
description: Fix findings and land code. Takes review findings as input, fixes them via workflow developer, runs full workspace checks in a loop until clean, then commits.

input:
  brief:
    type: text
    required: true
    description: The brief that was implemented — context for the developer fixing issues
  findings:
    type: text
    required: true
    description: Review findings to fix — the reviewer's list of issues with file locations and descriptions
  commit_prefix:
    type: text
    required: true
    description: "Commit message prefix (e.g. 'feat: action and evaluate step types (brief 27)')"

steps:
  # ═══════════════════════════════════════════════════════════════════════════
  # DETECT — what changed?
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Detect Changes
    kind: execute
    command: git diff --name-only
    parser: lines
    routes:
      success: Resolve Crates
      failure: Done

  - name: Resolve Crates
    kind: execute
    command: >-
      echo '{raw:Detect Changes.lines}'
      | tr ' ' '\n'
      | grep '^crates/'
      | cut -d/ -f1-2
      | sort -u
      | while read dir; do
      if [ -f "$dir/Cargo.toml" ]; then
      grep '^name' "$dir/Cargo.toml" | head -1 | sed 's/name *= *"//;s/"//';
      fi;
      done
      | sort -u
    parser: lines
    routes:
      success: Fix
      failure: Fix

  # ═══════════════════════════════════════════════════════════════════════════
  # FIX — developer fixes findings from review + any failing checks
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Fix
    kind: action
    target: function
    profile: workflow-developer
    output_schema: |
      {
        "type": "object",
        "properties": {
          "summary": {"type": "string"},
          "fixes_applied": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "issue": {"type": "string"},
                "file": {"type": "string"},
                "fix": {"type": "string"}
              },
              "required": ["issue", "file", "fix"]
            }
          }
        },
        "required": ["summary", "fixes_applied"]
      }
    prompt: |
      Fix all issues listed below. Read each finding, go to the file, and fix it.

      Brief (context for what was built): {input.brief}

      Files changed: {Detect Changes.lines}
      Crates affected: {Resolve Crates.lines}

      REVIEW FINDINGS TO FIX:
      {input.findings}

      {?Clippy.error_count}
      CLIPPY ALSO FAILED — {Clippy.error_count} errors, {Clippy.warning_count} warnings.
      Diagnostics:
      {Clippy.diagnostics}
      {/}

      {?Test.failed}
      TESTS ALSO FAILED — {Test.failed} failures.
      Failures:
      {Test.failures}
      {/}

      {?AST Scan.exit_code}
      AST-GREP SCAN ALSO FAILED.
      {AST Scan.raw}
      {/}

      Fix every issue. Do NOT run cargo, git, just, bun, or npm commands — the workflow handles all builds and tests.
    routes:
      success: Clippy
      failure: Done
    escalation:
      success[5]: Done

  # ═══════════════════════════════════════════════════════════════════════════
  # FULL WORKSPACE CHECKS
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Clippy
    kind: execute
    command: >-
      CRATES="{raw:Resolve Crates.lines}";
      if [ -n "$(echo $CRATES | tr -d '[:space:]')" ]; then
      cargo clippy --message-format=json --all-targets $(printf -- '-p %s ' $CRATES) -- -D warnings 2>&1;
      else
      cargo clippy --message-format=json --all-targets -- -D warnings 2>&1;
      fi
    parser: rust-diagnostics
    extract:
      - error_count
      - warning_count
    routes:
      success: Test
      failure: Fix

  - name: Test
    kind: execute
    command: >-
      CRATES="{raw:Resolve Crates.lines}";
      if [ -n "$(echo $CRATES | tr -d '[:space:]')" ]; then
      cargo test -q $(printf -- '-p %s ' $CRATES) -- --format=json -Z unstable-options 2>&1;
      else
      cargo test -q -- --format=json -Z unstable-options 2>&1;
      fi
    parser: rust-test-results
    extract:
      - passed
      - failed
      - failures
    routes:
      success: Fmt
      failure: Fix

  - name: Fmt
    kind: execute
    command: cargo fmt --workspace 2>&1; echo "exit:$?"
    parser: exit-code
    routes:
      success: AST Scan
      failure: AST Scan

  - name: AST Scan
    kind: execute
    command: ast-grep scan 2>&1; echo "exit:$?"
    parser: exit-code
    routes:
      success: Commit
      failure: Fix

  # ═══════════════════════════════════════════════════════════════════════════
  # COMMIT — all checks passed, commit the work
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Commit
    kind: execute
    command: >-
      git add -A &&
      git commit -m "{input.commit_prefix}

      Co-Authored-By: Claude Opus 4.6 (1M context) <noreply@anthropic.com>"
    parser: exit-code
    routes:
      success: Done
      failure: Done

  - name: Done
    kind: end
